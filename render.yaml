services:
  - type: web
    name: telegram-free-games-bot
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: TIMEZONE
        value: Europe/Berlin
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: DELIVERY_START_HOUR
        value: 9
      - key: DELIVERY_END_HOUR
        value: 21
